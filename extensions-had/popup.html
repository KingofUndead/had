<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 520px;
      background: linear-gradient(135deg, #0d0d0d 0%, #1a0a0a 100%);
      font-family: 'Segoe UI', 'Roboto', 'Consolas', 'Courier New', monospace;
      color: #e0e0e0;
      padding: 18px;
      border: 1px solid #8b0000;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(139, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }
    
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(139,0,0,0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes textGlow {
      0% { text-shadow: 0 0 5px #ff0000, 0 0 10px rgba(255,0,0,0.3); }
      100% { text-shadow: 0 0 15px #ff0000, 0 0 20px rgba(255,0,0,0.5); }
    }
    
    h3 {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff3333, #cc0000, #ff3333);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(255,0,0,0.3);
      letter-spacing: 4px;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
      animation: textGlow 2s ease-in-out infinite alternate;
    }
    
    .sub {
      text-align: center;
      font-size: 11px;
      color: #aa5555;
      margin-bottom: 15px;
      letter-spacing: 3px;
      font-weight: 500;
      position: relative;
      z-index: 1;
    }
    
    .tabs {
      display: flex;
      margin-bottom: 20px;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    
    .tab-btn {
      flex: 1;
      background: rgba(26, 10, 10, 0.8);
      border: 1px solid #4a0000;
      padding: 10px;
      color: #cc8888;
      font-family: 'Segoe UI', monospace;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 8px;
      backdrop-filter: blur(5px);
      letter-spacing: 1px;
    }
    
    .tab-btn:hover {
      background: rgba(139, 0, 0, 0.3);
      border-color: #ff0000;
      color: #ffaaaa;
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(139,0,0,0.3);
    }
    
    .tab-btn.active {
      background: linear-gradient(135deg, #2a0000, #1a0000);
      border-color: #ff0000;
      color: #ff6666;
      box-shadow: 0 0 15px rgba(255,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
      position: relative;
      z-index: 1;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .tab-content.active {
      display: block;
    }
    
    .status {
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 18px;
      font-family: 'Consolas', monospace;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }
    
    .status-on {
      background: linear-gradient(135deg, #1a0303, #0d0000);
      border: 1px solid #ff0000;
      color: #ff5555;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.5), inset 0 0 10px rgba(255,0,0,0.1);
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    .status-off {
      background: linear-gradient(135deg, #0a0a0a, #050505);
      border: 1px solid #3a1a1a;
      color: #885555;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }
    
    @keyframes pulse {
      0%, 100% { 
        box-shadow: 0 0 20px rgba(255, 0, 0, 0.3), inset 0 0 10px rgba(255,0,0,0.1);
        text-shadow: 0 0 5px rgba(255,0,0,0.5);
      }
      50% { 
        box-shadow: 0 0 30px rgba(255, 0, 0, 0.8), inset 0 0 15px rgba(255,0,0,0.2);
        text-shadow: 0 0 10px rgba(255,0,0,0.8);
      }
    }
    
    .group {
      margin-bottom: 15px;
      position: relative;
      z-index: 1;
    }
    
    label {
      display: block;
      font-size: 12px;
      color: #dd8888;
      margin-bottom: 6px;
      letter-spacing: 1.5px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      background: rgba(17, 0, 0, 0.8);
      border: 1px solid #6b0000;
      border-radius: 8px;
      color: #ffaaaa;
      font-size: 13px;
      font-family: 'Consolas', monospace;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }
    
    input:hover, select:hover, textarea:hover {
      border-color: #cc0000;
      background: rgba(26, 2, 2, 0.9);
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #ff0000;
      box-shadow: 0 0 12px rgba(255, 0, 0, 0.4), inset 0 0 5px rgba(255,0,0,0.1);
      background: #1a0202;
      color: #ffcccc;
    }
    
    input::placeholder, textarea::placeholder {
      color: #5a2a2a;
    }
    
    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      font-family: 'Segoe UI', monospace;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }
    
    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s ease;
    }
    
    button:hover::before {
      left: 100%;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #2a0000 0%, #1a0000 100%);
      border: 1px solid #aa0000;
      color: #ff6666;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, #3a0000 0%, #2a0000 100%);
      border-color: #ff3333;
      color: #ffaaaa;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 0, 0, 0.4);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #1a0000 0%, #0a0000 100%);
      border: 1px solid #660000;
      color: #cc7777;
    }
    
    .btn-danger:hover {
      background: linear-gradient(135deg, #2a0000 0%, #1a0000 100%);
      border-color: #cc0000;
      color: #ff8888;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(139, 0, 0, 0.4);
    }
    
    .btn-sm {
      width: auto;
      padding: 5px 12px;
      font-size: 11px;
      margin-top: 0;
      margin-left: 8px;
      letter-spacing: 1px;
    }
    
    .cookie-item {
      background: linear-gradient(135deg, rgba(26, 0, 0, 0.6), rgba(10, 0, 0, 0.8));
      border: 1px solid #4a0000;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-size: 12px;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }
    
    .cookie-item:hover {
      border-color: #aa0000;
      background: rgba(26, 0, 0, 0.8);
      transform: translateX(3px);
      box-shadow: 0 2px 8px rgba(139,0,0,0.2);
    }
    
    .cookie-name {
      color: #ff8888;
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 4px;
    }
    
    .cookie-value {
      color: #ccaaaa;
      word-break: break-all;
      font-family: 'Consolas', monospace;
      font-size: 11px;
    }
    
    .cookie-actions {
      margin-top: 8px;
    }
    
    .cookie-list {
      max-height: 320px;
      overflow-y: auto;
      margin-bottom: 12px;
      scrollbar-width: thin;
      scrollbar-color: #8b0000 #1a0000;
    }
    
    .cookie-list::-webkit-scrollbar {
      width: 6px;
    }
    
    .cookie-list::-webkit-scrollbar-track {
      background: #1a0000;
      border-radius: 3px;
    }
    
    .cookie-list::-webkit-scrollbar-thumb {
      background: #8b0000;
      border-radius: 3px;
    }
    
    .cookie-list::-webkit-scrollbar-thumb:hover {
      background: #cc0000;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .button-group button {
      flex: 1;
      margin-top: 0;
    }
    
    hr {
      margin: 18px 0 15px;
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, #8b0000, #ff0000, #8b0000, transparent);
      position: relative;
      z-index: 1;
    }
    
    .footer {
      font-size: 9px;
      text-align: center;
      color: #664444;
      letter-spacing: 2px;
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }
    
    .skull {
      text-align: center;
      font-size: 32px;
      margin-bottom: 5px;
      opacity: 0.7;
      filter: drop-shadow(0 0 5px rgba(255,0,0,0.5));
      animation: bounce 2s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    
    .info-text {
      font-size: 12px;
      color: #aa7777;
      margin-bottom: 10px;
      font-style: italic;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    
    .group select {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="skull">🕷️</div>
  <h3>HAD</h3>
  <div class="sub">/// DARK PROXY + COOKIE EDITOR ///</div>
  
  <div class="tabs">
    <button class="tab-btn active" data-tab="proxy">🌑 PROXY</button>
    <button class="tab-btn" data-tab="cookies">🍪 COOKIES</button>
  </div>
  
  <div id="proxy-tab" class="tab-content active">
    <div id="status" class="status status-off">⚫ INACTIVE ⚫</div>
    
    <div class="group">
      <label>🔴 PROXY TYPE</label>
      <select id="scheme">
        <option value="http">HTTP</option>
        <option value="https">HTTPS</option>
        <option value="socks4">SOCKS4</option>
        <option value="socks5">SOCKS5</option>
      </select>
    </div>
    
    <div class="group">
      <label>🏚️ HOST</label>
      <input type="text" id="host" placeholder="127.0.0.1" value="127.0.0.1">
    </div>
    
    <div class="group">
      <label>🗡️ PORT</label>
      <input type="number" id="port" placeholder="8085" value="8085">
    </div>
    
    <button id="enableBtn" class="btn-primary">🌑 ACTIVATE PROXY</button>
    <button id="disableBtn" class="btn-danger">⛧ DEACTIVATE</button>
  </div>
  
  <!-- Cookies Tab -->
  <div id="cookies-tab" class="tab-content">
    <div class="info-text">📦 Current site cookies - Only showing cookies for this domain</div>
    
    <div class="button-group">
      <button id="refreshCookiesBtn" class="btn-primary">⟳ REFRESH</button>
      <button id="copyCookiesBtn" class="btn-primary">📋 COPY ALL</button>
    </div>
    
    <div id="cookieList" class="cookie-list">
      <div class="info-text" style="text-align: center;">🍪 Loading cookies...</div>
    </div>
    
    <hr>
    
    <div class="group">
      <label>📤 EXPORT COOKIES</label>
      <select id="exportFormat">
        <option value="json">📄 JSON Format</option>
        <option value="netscape">🌐 Netscape Format (.txt)</option>
        <option value="header">🔗 Header String</option>
      </select>
      <button id="exportBtn" class="btn-primary">💾 EXPORT & DOWNLOAD</button>
    </div>
    
    <div class="group">
      <label>📥 IMPORT COOKIES</label>
      <textarea id="importData" placeholder="Paste cookies in JSON, Netscape or Header format..."></textarea>
      <button id="importBtn" class="btn-primary">📂 IMPORT & APPLY</button>
    </div>
  </div>
  
  <hr>
  <div class="footer">HAD // DARKNESS RISING</div>
  
  <script src="popup.js"></script>
</body>
</html>
